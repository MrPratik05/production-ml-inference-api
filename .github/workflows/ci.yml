name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn prometheus-client pydantic pytest httpx
          pip install transformers torch --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: pytest -q

      - name: Build Docker image
        run: docker build -t production-ml-inference-api .
